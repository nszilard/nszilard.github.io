<div class="container interest-container">
	<h3>{{ site.interests_title | default: "Hobbies and Interests" }}</h3>
	<div class="row clearfix">
		{% for interest in site.data.interests %}
		<div class="col-xs-12 col-sm-12 col-md-6 col-print-6 details">
			<div class="col-xs-3 col-sm-3 col-md-3 col-print-3 type">
				<h2>{{ interest.type }}</h2>
			</div>
			<div class="col-xs-9 col-sm-9 col-md-9 col-print-9 elements">
				{{ interest.content | strip | markdownify }}
			</div>
		</div>
		{% endfor %}
	</div>
</div>
